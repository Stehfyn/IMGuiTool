name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---------------- Linux ----------------
          - { name: linux-gcc-ninja,    os: ubuntu-latest, kind: preset, preset: linux-gcc }
          - { name: linux-clang-ninja,  os: ubuntu-latest, kind: preset, preset: linux-clang }
          - { name: linux-gcc-make,     os: ubuntu-latest, kind: raw,    generator: "Unix Makefiles", cc: gcc, cxx: g++ }
          # ---------------- Windows ----------------
          - { name: windows-msvc-ninja,    os: windows-latest, kind: preset, preset: msvc,     msvc_env: true }
          - { name: windows-clang-cl-ninja,os: windows-latest, kind: preset, preset: clang-cl, msvc_env: true }
          - { name: windows-mingw-ninja,   os: windows-latest, kind: preset, preset: mingw }
          - { name: windows-msvc-msbuild,  os: windows-2022,   kind: raw,    generator: "Visual Studio 17 2022" }
          # ---------------- macOS ----------------
          - { name: macos-clang-ninja, os: macos-latest, kind: preset, preset: macos-clang }
          - { name: macos-clang-make,  os: macos-latest, kind: raw,    generator: "Unix Makefiles", cc: clang, cxx: clang++ }

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        env:
          PRESET: ${{ matrix.preset }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            $(cat scripts/packages.txt) $([ "$PRESET" = linux-clang ] && echo clang)

      - name: Install Ninja (Windows / macOS)
        if: matrix.kind == 'preset' && runner.os != 'Linux'
        run: |
          if [ "$RUNNER_OS" = Windows ]; then choco install ninja -y --no-progress; else brew install ninja; fi

      - name: Set up MSVC environment
        if: matrix.msvc_env
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure & build — Debug + Release (preset)
        if: matrix.kind == 'preset'
        env:
          PRESET: ${{ matrix.preset }}
        run: |
          cmake --preset "$PRESET"
          cmake --build --preset "$PRESET-release"
          cmake --build --preset "$PRESET-debug"

      - name: Configure & build — Debug + Release (raw)
        if: matrix.kind == 'raw'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          GENERATOR: ${{ matrix.generator }}
        run: |
          # Drop empty CC/CXX so CMake auto-detects (the VS generator picks its own).
          [ -z "${CC:-}" ]  && unset CC  || true
          [ -z "${CXX:-}" ] && unset CXX || true
          for cfg in Release Debug; do
            args=(-S . -B "build-$cfg" -G "$GENERATOR" -D CMAKE_BUILD_TYPE="$cfg")
            case "$GENERATOR" in "Visual Studio"*) args+=(-A x64) ;; esac
            cmake "${args[@]}"
            cmake --build "build-$cfg" --config "$cfg" --parallel
          done

      - name: Verify binaries (Debug + Release)
        run: |
          [ "$RUNNER_OS" = Windows ] && exe=IMGuiTool.exe || exe=IMGuiTool
          found=$(find build build-Debug build-Release -name "$exe" -type f 2>/dev/null || true)
          printf '%s\n' "$found"
          n=$(printf '%s\n' "$found" | grep -c . || true)
          [ "$n" -ge 2 ] || { echo "::error::expected Debug and Release $exe, found $n"; exit 1; }

      # upload-artifact zips its inputs and drops the Unix exec bit, so wrap the
      # binaries in a tar that preserves mode -> extract and they just run.
      - name: Package binaries
        run: |
          [ "$RUNNER_OS" = Windows ] && exe=IMGuiTool.exe || exe=IMGuiTool
          mkdir -p dist
          for d in build build-Debug build-Release; do
            [ -d "$d" ] || continue
            find "$d" -name "$exe" -type f
          done | while read -r f; do
            cfg=$(printf '%s' "$f" | grep -oiE 'debug|release' | head -1 | tr 'A-Z' 'a-z')
            cp -p "$f" "dist/IMGuiTool-${cfg}${exe#IMGuiTool}"
          done
          ls -l dist
          tar -C dist -czf "IMGuiTool-${{ matrix.name }}.tar.gz" .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IMGuiTool-${{ matrix.name }}
          path: IMGuiTool-${{ matrix.name }}.tar.gz
          if-no-files-found: error
          retention-days: 7
